{% extends 'base.html' %}
{% block header %}
  <h2>
    {% block title %}
      Hi-Scores
    {% endblock %}
  </h2>
{% endblock %}

{% block content %}
  <div class="columns is-mobile is-multiline">
    {% for game in games %}
      <div class="column">
        <div class="box column hi-score">{{ game['player'] }} - {{ game['score'] }}</div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
